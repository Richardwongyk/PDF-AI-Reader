model:
  local: qwen3.5:4b
  cloud: deepseek/deepseek-v4-flash
  cloud_translation: deepseek/deepseek-v4-flash
  cloud_reasoning: deepseek/deepseek-v4-pro
  embed_local: bge-m3
  # pix2text-mfr is the default. Install PaddleOCR and set paddle_formula for
  # PP-FormulaNet_plus high-accuracy formula OCR in explicit/background scans.
  formula_ocr_backend: pix2text-mfr
  formula_ocr_model: PP-FormulaNet_plus-S
  ollama_host: http://localhost:11434
rag:
  # legacy_chroma is the default vector store. sqlite_fts is a lightweight
  # no-extra-dependency full-text backend for fast large-document baselines.
  backend: legacy_chroma
  graph_backend: disabled
  candidate_pool: 48
  final_evidence: 8
  enable_hybrid_rerank: true
  enable_graph_index: false
routing:
  translation: cloud_only
  qa: cloud_only
  summarization: cloud_only
  embed: local_only
  auto_upgrade_threshold: 2000
ui:
  language: zh_CN
  # dark 为默认黑底阅读风格；可切换 dark / sepia / light_gray / black_white。
  theme: dark
  split_position: below
  font_size: 12
  line_spacing: 1.5
  show_word_translation: false
api_keys:
  deepseek/deepseek-v4-flash: "在此填入你的 API Key"
  deepseek/deepseek-v4-pro: "可选；未填写时会复用同一 DeepSeek provider 的 key"
